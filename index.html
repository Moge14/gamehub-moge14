<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameHub Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green: #107C10; 
  --green-b: #52B043;
  --bg-dark: #070707; /* Deep solid black */
  --bg-panel: #121212; /* Subtle panel gray */
  --border: rgba(255,255,255,0.08);
  --text: #FFFFFF;
  --muted: #888888;
  --sb-width: 260px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { 
    font-family: 'Barlow', sans-serif; 
    background: var(--bg-dark); 
    color: var(--text); 
    display: flex; 
    height: 100vh; 
    overflow: hidden; 
}

/* ── SIDEBAR ── */
#sidebar {
    width: var(--sb-width);
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 0;
}

.sb-brand {
    padding: 0 24px;
    margin-bottom: 32px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--green-b);
    display: flex;
    align-items: center;
    gap: 10px;
}

.nav-section { margin-bottom: 24px; }
.nav-label {
    padding: 0 24px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 12px;
    display: block;
}

.nav-item {
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    color: var(--muted);
    transition: 0.2s;
    font-size: 14px;
    font-weight: 500;
}

.nav-item:hover { background: rgba(255,255,255,0.03); color: #fff; }
.nav-item.active { 
    background: rgba(16,124,16,0.1); 
    color: var(--green-b); 
    border-right: 3px solid var(--green-b); 
}

/* ── MAIN CONTENT ── */
#main {
    flex: 1;
    overflow-y: auto;
    padding: 40px;
    position: relative;
}

.page { display: none; max-width: 1100px; margin: 0 auto; }
.page.active { display: block; animation: fadeIn 0.3s ease; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ── FEATURED COMPONENTS (TONED DOWN) ── */
.hero-banner {
    height: 320px;
    background: #1a1a1a;
    border-radius: 12px;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    margin-bottom: 30px;
    border: 1px solid var(--border);
}

.hero-title { font-family: 'Rajdhani'; font-size: 42px; line-height: 1; margin-bottom: 10px; }
.btn-primary {
    background: var(--green);
    color: white;
    padding: 12px 28px;
    border: none;
    border-radius: 4px;
    font-weight: 600;
    cursor: pointer;
    width: fit-content;
}

/* ── GRID SYSTEM ── */
.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    font-family: 'Rajdhani';
    text-transform: uppercase;
    letter-spacing: 1px;
}

.game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
}

.game-card {
    background: var(--bg-panel);
    border-radius: 8px;
    aspect-ratio: 3/4;
    padding: 12px;
    border: 1px solid var(--border);
    transition: 0.2s;
    cursor: pointer;
}

.game-card:hover { border-color: var(--green-b); transform: translateY(-4px); }
.card-thumb { height: 75%; background: #222; border-radius: 4px; margin-bottom: 10px; }

/* ── OVERLAY FIX ── */
#game-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 1000;
    flex-direction: column;
}
#game-modal.open { display: flex; }
.modal-bar { 
    height: 50px; 
    padding: 0 20px; 
    display: flex; 
    align-items: center; 
    background: #111; 
    border-bottom: 1px solid var(--border);
}

</style>
</head>
<body>

<aside id="sidebar">
    <div class="sb-brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--green-b)"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        GAMEHUB
    </div>

    <nav class="nav-section">
        <span class="nav-label">Menu</span>
        <div class="nav-item active" onclick="showPage('home')">Home</div>
        <div class="nav-item" onclick="showPage('library')">My Library</div>
        <div class="nav-item" onclick="showPage('store')">Store</div>
    </nav>

    <nav class="nav-section">
        <span class="nav-label">Social</span>
        <div class="nav-item" onclick="showPage('friends')">Friends</div>
        <div class="nav-item" onclick="showPage('profile')">My Profile</div>
    </nav>
</aside>

<main id="main">
    <div id="home" class="page active">
        <div class="hero-banner">
            <h1 class="hero-title">NEON STRIKE</h1>
            <p style="color: var(--muted); margin-bottom: 20px;">Experience the next generation of combat.</p>
            <button class="btn-primary" onclick="launchGame('neon-strike', 'Neon Strike')">PLAY NOW</button>
        </div>

        <div class="section-header"><h2>Recently Played</h2></div>
        <div class="game-grid">
            <div class="game-card"><div class="card-thumb"></div><p>Void Walker</p></div>
            <div class="game-card"><div class="card-thumb"></div><p>Star Drift</p></div>
            <div class="game-card"><div class="card-thumb"></div><p>Cyber Siege</p></div>
        </div>
    </div>

    <div id="store" class="page">
        <div class="section-header"><h2>Store Highlights</h2></div>
        <div class="game-grid">
            <div class="game-card"><div class="card-thumb"></div><p>Premium Title A</p></div>
            <div class="game-card"><div class="card-thumb"></div><p>Premium Title B</p></div>
        </div>
    </div>
</main>

<div id="game-modal">
    <div class="modal-bar">
        <span id="playing-title" style="font-weight: 600;">LOADING ENGINE...</span>
        <button onclick="closeGame()" style="margin-left:auto; background:none; color:white; border:none; cursor:pointer;">Exit Game</button>
    </div>
    <div id="frame-host" style="flex:1;"></div>
</div>

<script>
const EMBEDDED = {
    'neon-strike': `<html><body style="background:#000; color:#52B043; display:flex; align-items:center; justify-content:center; height:100vh; font-family:sans-serif;"><h1>NEON STRIKE IS RUNNING</h1></body></html>`
};

function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    
    document.getElementById(pageId).classList.add('active');
    event.currentTarget.classList.add('active');
}

function launchGame(slug, name) {
    const html = EMBEDDED[slug];
    const host = document.getElementById('frame-host');
    const modal = document.getElementById('game-modal');
    
    if (html) {
        document.getElementById('playing-title').innerText = "PLAYING: " + name;
        const blob = new Blob([html], {type: 'text/html'});
        const url = URL.createObjectURL(blob);
        
        host.innerHTML = `<iframe src="${url}" style="width:100%; height:100%; border:none;"></iframe>`;
        modal.style.display = 'flex';
    }
}

function closeGame() {
    document.getElementById('game-modal').style.display = 'none';
    document.getElementById('frame-host').innerHTML = '';
}
</script>

</body>
</html>
