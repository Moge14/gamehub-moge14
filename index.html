<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameHub | Minimal</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #52B043;
  --bg-main: #0a0a0a;
  --bg-side: #121212;
  --bg-card: #1c1c1c;
  --text: #ffffff;
  --text-dim: #a0a0a0;
  --sidebar-w: 240px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-main);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── SIDEBAR ── */
#sidebar {
  width: var(--sidebar-w);
  background: var(--bg-side);
  border-right: 1px solid #252525;
  display: flex;
  flex-direction: column;
  padding: 24px;
}

.logo {
  font-family: 'Rajdhani', sans-serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 40px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-group { margin-bottom: 30px; }
.nav-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 12px;
  display: block;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 8px;
  color: var(--text-dim);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: 0.2s;
  cursor: pointer;
  margin-bottom: 4px;
}

.nav-item:hover, .nav-item.active {
  background: #252525;
  color: #fff;
}

.nav-item.active {
  color: var(--primary);
}

/* ── MAIN CONTENT ── */
#main {
  flex: 1;
  overflow-y: auto;
  padding: 40px;
}

.page { display: none; max-width: 1000px; margin: 0 auto; }
.page.active { display: block; animation: fadeIn 0.3s ease; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

h1 { font-family: 'Rajdhani', sans-serif; font-size: 32px; margin-bottom: 24px; }

/* ── SIMPLIFIED CARDS ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
}

.card {
  background: var(--bg-card);
  border-radius: 12px;
  padding: 16px;
  transition: transform 0.2s;
  border: 1px solid transparent;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-4px);
  border-color: #333;
}

.card-img {
  width: 100%;
  aspect-ratio: 16/9;
  background: #252525;
  border-radius: 8px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

.card-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.card-sub { font-size: 12px; color: var(--text-dim); }

/* ── GAME OVERLAY ── */
#game-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 1000;
}

#game-overlay.open { display: flex; flex-direction: column; }

.overlay-header {
  height: 50px;
  padding: 0 20px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

#game-frame { flex: 1; border: none; width: 100%; height: 100%; }

.btn-close {
  background: #222;
  color: #fff;
  border: none;
  padding: 6px 16px;
  border-radius: 4px;
  cursor: pointer;
}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="logo">
    <div style="width:12px; height:12px; background:var(--primary); border-radius:2px;"></div>
    GAMEHUB
  </div>

  <nav class="nav-group">
    <span class="nav-label">Browse</span>
    <div class="nav-item active" onclick="showPage('home')">Home</div>
    <div class="nav-item" onclick="showPage('store')">Store</div>
    <div class="nav-item" onclick="showPage('library')">Library</div>
  </nav>

  <nav class="nav-group">
    <span class="nav-label">Social</span>
    <div class="nav-item" onclick="showPage('friends')">Friends</div>
    <div class="nav-item" onclick="showPage('profile')">Profile</div>
  </nav>
</aside>

<main id="main">
  <div id="home" class="page active">
    <h1>Welcome back</h1>
    <div class="grid">
      <div class="card" onclick="launchGame('neon-strike', 'Neon Strike')">
        <div class="card-img">🚀</div>
        <div class="card-title">Neon Strike</div>
        <div class="card-sub">Action • Ready to play</div>
      </div>
      <div class="card">
        <div class="card-img">⚔️</div>
        <div class="card-title">Void Walker</div>
        <div class="card-sub">RPG • Installed</div>
      </div>
    </div>
  </div>

  <div id="library" class="page">
    <h1>Your Collection</h1>
    <p style="color:var(--text-dim)">You have 2 games in your library.</p>
  </div>
</main>

<div id="game-overlay">
  <div class="overlay-header">
    <span id="playing-title" style="font-weight:600; font-size:14px;"></span>
    <button class="btn-close" onclick="closeGame()">Exit Game</button>
  </div>
  <div id="game-frame"></div>
</div>

<script>
const EMBEDDED = {
  'neon-strike': `<html><body style="background:#000; color:#52B043; display:flex; align-items:center; justify-content:center; height:100vh;"><h1>GAME RUNNING</h1></body></html>`
};

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  
  document.getElementById(id).classList.add('active');
  event.currentTarget.classList.add('active');
}

function launchGame(slug, name) {
  const html = EMBEDDED[slug];
  const frameWrap = document.getElementById('game-frame');
  const overlay = document.getElementById('game-overlay');
  
  if (html) {
    document.getElementById('playing-title').innerText = name;
    const blob = new Blob([html], {type: 'text/html'});
    const url = URL.createObjectURL(blob);
    
    frameWrap.innerHTML = `<iframe src="${url}" style="width:100%; height:100%; border:none;"></iframe>`;
    overlay.classList.add('open');
  }
}

function closeGame() {
  document.getElementById('game-overlay').classList.remove('open');
  document.getElementById('game-frame').innerHTML = '';
}
</script>

</body>
</html>
