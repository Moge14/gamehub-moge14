<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameHub</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green:#107C10; --green-b:#52B043;
  --bg:#07100A; --bg2:#0C160E; --bg3:#111D13;
  --text:#FFFFFF; --muted:#7A8A7A; --dim:#2E3E2E;
  --sb:56px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;display:flex;}

/* ── SIDEBAR ── */
#sidebar{
  width:var(--sb);flex-shrink:0;
  background:rgba(7,16,10,0.85);
  border-right:0.5px solid rgba(82,176,67,0.13);
  display:flex;flex-direction:column;align-items:center;
  padding:14px 0 16px;gap:2px;
  height:100vh;z-index:200;
}
.sb-logo{
  width:32px;height:32px;border-radius:8px;
  background:#107C10;display:flex;align-items:center;justify-content:center;
  margin-bottom:16px;cursor:pointer;flex-shrink:0;
}
.sb-item{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background 0.15s;position:relative;flex-shrink:0;
}
.sb-item:hover{background:rgba(255,255,255,0.06);}
.sb-item.active{background:rgba(82,176,67,0.18);}
.sb-item svg{width:17px;height:17px;stroke:rgba(255,255,255,0.32);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
.sb-item.active svg{stroke:rgba(82,176,67,0.9);}

/* ── MAIN AREA ── */
#main{flex:1;height:100vh;overflow-y:auto;position:relative;}
.page{display:none;padding:20px;position:relative;z-index:1;min-height:100vh;}
.page.active{display:block;}

/* ── HERO ── */
.hero{position:relative;height:280px;border-radius:10px;overflow:hidden;background:#0C1A2A;margin-bottom:20px;}
.hero-content{position:absolute;bottom:20px;left:20px;z-index:2;}
.hero-title{font-family:'Rajdhani',sans-serif;font-size:36px;font-weight:700;margin-bottom:10px;}
.btn-play{background:var(--green);color:#fff;border:none;padding:10px 24px;border-radius:4px;font-weight:600;cursor:pointer;}

/* ── MODAL ── */
.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:500;
  align-items:center;justify-content:center;
}
.modal-bg.open{display:flex;}
.modal{
  background:#0B140C;border:0.5px solid rgba(82,176,67,0.22);
  border-radius:10px;width:90vw;height:85vh;display:flex;flex-direction:column;overflow:hidden;
}
.modal-head{padding:15px;display:flex;align-items:center;border-bottom:0.5px solid rgba(255,255,255,0.1);}
.modal-close{margin-left:auto;cursor:pointer;background:none;border:none;color:white;font-size:20px;}
#m-iframe{flex:1;background:#000;}
</style>
</head>
<body>

<nav id="sidebar">
  <div class="sb-logo" onclick="showPage('home')">
    <svg viewBox="0 0 24 24" fill="white" width="15"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
  </div>
  <div class="sb-item active" onclick="showPage('home')">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
  </div>
  <div class="sb-item" onclick="showPage('library')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
  </div>
</nav>

<main id="main">
  <div id="home" class="page active">
    <div class="hero">
      <div class="hero-content">
        <h1 class="hero-title">Neon Strike</h1>
        <button class="btn-play" onclick="launchGame('neon-strike', 'Neon Strike')">PLAY NOW</button>
      </div>
    </div>
  </div>

  <div id="library" class="page">
    <h2 style="font-family:'Rajdhani'">My Library</h2>
    <p style="color:var(--muted); margin-top:10px;">Your collection is empty.</p>
  </div>
</main>

<div id="game-modal" class="modal-bg">
  <div class="modal">
    <div class="modal-head">
      <span id="m-title" style="font-family:'Rajdhani'; font-weight:700;">Loading...</span>
      <button class="modal-close" onclick="closeGame()">&times;</button>
    </div>
    <div id="m-iframe"></div>
  </div>
</div>

<script>
// 1. Storage for your games (This replaces the raw code on screen)
const EMBEDDED = {
  'neon-strike': `
    <html>
      <body style="background:#000; color:#52B043; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif;">
        <h1 style="font-size:48px;">NEON STRIKE</h1>
        <p>Game engine initialized successfully.</p>
        <div style="width:200px; height:4px; background:#111; margin-top:20px;">
            <div style="width:60%; height:100%; background:#52B043;"></div>
        </div>
      </body>
    </html>`
};

// 2. Navigation
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  // Highlight sidebar item logic can be added here
}

// 3. THE FIX: Logic to handle frame showing
window.launchGame = function(slug, name) {
  const html = EMBEDDED[slug];
  const wrap = document.getElementById('m-iframe');
  const modal = document.getElementById('game-modal');
  const title = document.getElementById('m-title');

  if (html && wrap) {
    title.innerText = name.toUpperCase();
    
    // Create the Blob
    const blob = new Blob([html], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    
    // Inject the iframe
    wrap.innerHTML = '';
    const iframe = document.createElement('iframe');
    iframe.src = url;
    iframe.style.width = '100%';
    iframe.style.height = '100%';
    iframe.style.border = 'none';
    iframe.setAttribute('allow', 'pointer-lock');
    
    // Clean up memory
    iframe.onload = () => {
      setTimeout(() => URL.revokeObjectURL(url), 8000);
    };

    wrap.appendChild(iframe);
    modal.classList.add('open');
  }
};

function closeGame() {
  document.getElementById('game-modal').classList.remove('open');
  document.getElementById('m-iframe').innerHTML = '';
}
</script>

</body>
</html>
